openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: triage
    description: Lead triage operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /triage:
    post:
      operationId: triageMessages
      tags: [triage]
      summary: Triage inbound messages
      description: Takes up to 5 inbound messages and returns lead category, urgency, next action, and draft reply for each
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriageInput"
      responses:
        "200":
          description: Triage results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriageResults"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    TriageInput:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 5
    TriageResult:
      type: object
      required:
        - message
        - leadCategory
        - urgency
        - nextAction
        - draftReply
      properties:
        message:
          type: string
        leadCategory:
          type: string
        urgency:
          type: string
          enum: [high, medium, low]
        nextAction:
          type: string
        draftReply:
          type: string
    TriageResults:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/TriageResult"
