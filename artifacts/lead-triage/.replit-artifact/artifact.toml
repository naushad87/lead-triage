kind = "web"
previewPath = "/"
title = "Lead Triage"
version = "1.0.0"
id = "artifacts/lead-triage"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26134

[services.development]
run = "pnpm --filter @workspace/lead-triage run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lead-triage", "run", "build" ]
publicDir = "artifacts/lead-triage/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26134"
BASE_PATH = "/"
